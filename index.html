<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fransina Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.3);
            padding: 50px;
            max-width: 800px;
            text-align: center;
        }
        
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            color: #667eea;
        }
        
        .subtitle {
            font-size: 1.2em;
            color: #666;
            margin-bottom: 30px;
        }
        
        .intro {
            font-size: 1.1em;
            color: #555;
            margin-bottom: 30px;
            line-height: 1.8;
        }
        
        .links {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 30px;
        }
        
        .links a {
            display: inline-block;
            padding: 12px 24px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background 0.3s ease;
            font-weight: 500;
        }
        
        .links a:hover {
            background: #764ba2;
        }
        
        .footer {
            margin-top: 50px;
            padding-top: 30px;
            border-top: 1px solid #eee;
            color: #999;
            font-size: 0.9em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>👋 Welcome!</h1>
        <p class="subtitle">Fransina's Portfolio</p>
        
        <div class="intro">
            <p>Hi! I'm Fransina, a developer passionate about creating quality software and solving problems.</p>
            <p>This is my portfolio space showcasing my work and projects.</p>
        </div>
        
        <div class="links">
            <a href="https://github.com/fransinajunias-droid" target="_blank">GitHub</a>
            <a href="https://github.com/fransinajunias-droid/fransina-portfolio" target="_blank">Repository</a>
        </div>
        
        <div class="footer">
            <p>&copy; 2026 Fransina. All rights reserved.</p>
        </div>
    </div>
</body>
</html>
